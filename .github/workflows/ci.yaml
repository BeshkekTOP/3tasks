name: My 3-Task Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  task-1:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Выполнить задачу 1
      run: |
        echo "Запуск задачи 1..."
        echo "Задача 1 выполнена успешно!"
        echo "Теперь могут запуститься задачи 2 и 3"

  task-2:
    runs-on: ubuntu-latest
    needs: task-1  
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Выполнить задачу 2
      run: |
        echo " Запуск задачи 2..."
        echo "Задача 2 выполнена успешно!"

  task-3:
    runs-on: ubuntu-latest
    needs: task-1  
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Выполнить задачу 3
      run: |
        echo " Запуск задачи 3..."
        echo "Задача 3 выполнена успешно!"